services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: react-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/home/react/app
      - /home/react/app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: genie-backend
    ports:
      - "8000:8000"
      - "80:80"
    volumes:
      - ./backend:/home/genie/app
    environment:
      - GENIE_ENV=dev
      - JULIA_REVISE=on

  api-gateway:
    image: tiangolo/uvicorn-gunicorn-fastapi:python3.11
    container_name: api-gateway
    depends_on:
      - backend
      - mesh-utils
      - frontend
    ports:
      - "8080:80" # expose gateway on host 8080 -> container 80 (uvicorn/gunicorn)
    volumes:
      - ./gateway:/app
    environment:
      - WORKERS_PER_CORE=1
      - MAX_WORKERS=2
      - LOG_LEVEL=info
    command: >
      /start-reload.sh
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 120s
      timeout: 10s
      retries: 3

  mesh-utils:
    build:
      context: ./mesh-utils
      dockerfile: Dockerfile.dev
    container_name: mesh-utils
    ports:
      - "8001:8000"
    volumes:
      - ./backend:/home/genie/app
    environment:
      - GENIE_ENV=dev
      - JULIA_REVISE=on
